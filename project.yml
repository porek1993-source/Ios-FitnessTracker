# ═══════════════════════════════════════════════════════════════════════
# project.yml — XcodeGen konfigurace pro AgileFitnessTrainer
# Verze: 2.0 (finální — s HealthKit entitlements a privacy strings)
# ═══════════════════════════════════════════════════════════════════════
#
# RYCHLÝ START (Windows/Linux):
#   Edituj Swift soubory, commitni na GitHub.
#   GitHub Actions (ios-build.yml) automaticky:
#     1. Nainstaluje XcodeGen
#     2. Spustí: xcodegen generate
#     3. Zkompiluje a exportuje .ipa
#
# LOKÁLNÍ GENEROVÁNÍ (pokud máš macOS):
#   brew install xcodegen
#   cd AgileFitnessTrainer_IOS
#   xcodegen generate
# ═══════════════════════════════════════════════════════════════════════

name: AgileTrainer

options:
  bundleIdPrefix: com.agilefitness
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  # Prevence XcodeGen varování pro Swift 5.9+
  developmentLanguage: cs
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

# ═══════════════════════════════════════════════════════════════════════
# GLOBÁLNÍ BUILD SETTINGS
# ═══════════════════════════════════════════════════════════════════════

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

    # Code Signing — přepíše se v CI přes xcodebuild parametry
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM_ID)

    # API klíče — injektovány přes GitHub Secrets nebo lokální .env
    GEMINI_API_KEY: $(GEMINI_API_KEY)
    SUPABASE_URL: $(SUPABASE_URL)
    SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)

    # Swift optimalizace
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"        # Debug
    GCC_OPTIMIZATION_LEVEL: "0"

    # Prevence pádů z Obj-C/Swift boundary
    SWIFT_STRICT_CONCURRENCY: complete        # Zapne strict concurrency checks

  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"

# ═══════════════════════════════════════════════════════════════════════
# TARGETS
# ═══════════════════════════════════════════════════════════════════════

targets:

  # ─── Hlavní aplikace ────────────────────────────────────────────────
  AgileTrainer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Zdrojové soubory — všechny Swift soubory v těchto složkách
    sources:
      - path: App
      - path: Core
      - path: Data
      - path: Domain
      - path: Features
      - path: LiveActivity
      - path: Services

    # Resources — JSON data, texty, plist
    resources:
      - path: Resources/ExerciseDatabase.json
        buildPhase: resources
      - path: Resources/SystemPrompt.txt
        buildPhase: resources
      - path: Resources/OnboardingSystemPrompt.txt
        buildPhase: resources

    # ── Build Settings ───────────────────────────────────────────────
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agilefitness.trainer
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/AgileTrainer.entitlements

        # Přidáme klíče přímo do Info.plist přes XcodeGen (viz sekce 'info' níže)
        # Tím odpadá nutnost ručně editovat plist na Windows

    # ── Info.plist klíče (generuje XcodeGen) ─────────────────────────
    #
    # ZDRAVÍ — POVINNÉ pro App Store schválení:
    # NSHealthShareUsageDescription: Proč čteš zdravotní data?
    # NSHealthUpdateUsageDescription: Proč zapisuješ zdravotní data?
    #
    # Apple App Review tato pole kontroluje a odmítne app bez nich.
    info:
      path: Resources/Info.plist
      properties:
        # ── Základní app metadata ──
        CFBundleDevelopmentRegion: cs
        CFBundleDisplayName: Agile Trainer
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true

        # ── UI konfigurace ──
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64

        # ── API klíče v plistu (pro Bundle.main.infoDictionary přístup) ──
        GEMINI_API_KEY: $(GEMINI_API_KEY)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)

        # ══════════════════════════════════════════════════════════════
        # HEALTHKIT PRIVACY STRINGS — POVINNÉ
        # App Store Connect: bez těchto klíčů je app zamítnuta při review
        # ══════════════════════════════════════════════════════════════

        # Čtení zdravotních dat (spánek, HRV, tep)
        NSHealthShareUsageDescription: >
          Agilní trenér potřebuje číst tvůj spánek a HRV z Apple Health,
          aby ti Jakub mohl na míru přizpůsobit dnešní trénink a předešel zranění
          způsobeným přetrénováním.

        # Zápis zdravotních dat (tréninky, kalorie)
        NSHealthUpdateUsageDescription: >
          Aplikace zapisuje tvé odjeté tréninky a spálené kalorie do Apple Health,
          abys měl kompletní přehled o své fyzické aktivitě na jednom místě.

        # ── Background Tasks (BGAppRefresh pro HealthKit sync) ──
        BGTaskSchedulerPermittedIdentifiers:
          - com.agilefitness.healthSync

        # ── Notifikace ──
        NSUserNotificationUsageDescription: >
          Jakub ti pošle připomínku tréninku a týdenní report výsledků.

    # ── Entitlements (capabilities) ──────────────────────────────────
    #
    # Tyto capabilities musí odpovídat nastavení v Apple Developer Portal.
    # Pro lokální testování: Xcode → Signing & Capabilities → přidej ručně.
    entitlements:
      path: Resources/AgileTrainer.entitlements
      properties:
        # HealthKit — hlavní funkce aplikace
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - HKQuantityTypeIdentifierHeartRate
          - HKQuantityTypeIdentifierRestingHeartRate
          - HKQuantityTypeIdentifierHeartRateVariabilitySDNN
          - HKCategoryTypeIdentifierSleepAnalysis
          - HKQuantityTypeIdentifierRespiratoryRate
          - HKQuantityTypeIdentifierActiveEnergyBurned
          - HKQuantityTypeIdentifierBasalEnergyBurned
          - HKWorkoutTypeIdentifier

        # App Groups — sdílené úložiště pro Widget Extension
        com.apple.security.application-groups:
          - group.com.agilefitness.shared

        # Push notifikace (APNs)
        aps-environment: production  # Přepne se na "development" pro Debug config

    # ── Pre-Build Scripts ─────────────────────────────────────────────
    preBuildScripts:
      - name: "SwiftLint (optional)"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint --config .swiftlint.yml || true
          else
            echo "SwiftLint není nainstalován, přeskakuji lint."
          fi
        basedOnDependencyAnalysis: false
        showEnvVarsInLog: false

  # ─── Widget Extension ────────────────────────────────────────────────
  AgileTrainerWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Widget
      # Sdílené soubory — Widget potřebuje přístup k modelům a konstansám
      - path: Core/SharedModelContainer.swift
      - path: Core/Utilities/AppLogger.swift
      - path: Core/Extensions/Color+App.swift
      - path: Core/Extensions/Extensions.swift
      - path: Core/Constants/AppConstants.swift
      - path: Data/Models

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agilefitness.trainer.widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/AgileTrainerWidget.entitlements

    entitlements:
      path: Widget/AgileTrainerWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.agilefitness.shared

    dependencies:
      - target: AgileTrainer
        embed: false
        link: false

  # ─── Unit Testy ──────────────────────────────────────────────────────
  AgileTrainerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: UnitTests

    dependencies:
      - target: AgileTrainer

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agilefitness.trainer.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AgileTrainer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AgileTrainer"
        BUNDLE_LOADER: "$(TEST_HOST)"

# ═══════════════════════════════════════════════════════════════════════
# SCHEMES
# ═══════════════════════════════════════════════════════════════════════

schemes:
  AgileTrainer:
    build:
      targets:
        AgileTrainer:       all
        AgileTrainerWidget: all
        AgileTrainerTests:  [test]
    run:
      config: Debug
      # Environmentální proměnné pro lokální vývoj
      # Pro CI jsou injektovány přes xcodebuild parametry
      environmentVariables:
        GEMINI_API_KEY:    $(GEMINI_API_KEY)
        SUPABASE_URL:      $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    test:
      config: Debug
      targets:
        - AgileTrainerTests
      coverageTargets:
        - AgileTrainer
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
