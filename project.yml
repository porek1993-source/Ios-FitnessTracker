# ═══════════════════════════════════════════════════════════════════════
# project.yml — XcodeGen konfigurace pro AgileFitnessTrainer
# Verze: 2.1 (finální — opravené entitlements, HealthKit, Watch target)
# ═══════════════════════════════════════════════════════════════════════
#
# RYCHLÝ START (Windows/Linux — bez Xcode):
#   Edituj Swift soubory → commitni na GitHub
#   GitHub Actions (ios-build.yml) automaticky:
#     1. Nainstaluje XcodeGen přes Homebrew
#     2. xcodegen generate --spec project.yml
#     3. Zkompiluje a uloží .ipa jako GitHub Artifact
#
# LOKÁLNÍ GENEROVÁNÍ (macOS):
#   brew install xcodegen
#   cd AgileFitnessTrainer_IOS
#   xcodegen generate
#   open AgileTrainer.xcodeproj
# ═══════════════════════════════════════════════════════════════════════

name: AgileTrainer

options:
  bundleIdPrefix: com.agilefitness
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"             # Aktualizuj dle verze Xcode na CI
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  developmentLanguage: cs          # Primární jazyk projektu = čeština
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

# ═══════════════════════════════════════════════════════════════════════
# GLOBÁLNÍ BUILD SETTINGS
# ═══════════════════════════════════════════════════════════════════════

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"          # 1 = iPhone only

    # Code Signing — přepíše CI přes xcodebuild parametry
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM_ID)

    # API klíče — injektovány přes GitHub Secrets nebo lokální xcconfig
    GEMINI_API_KEY:    $(GEMINI_API_KEY)
    SUPABASE_URL:      $(SUPABASE_URL)
    SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)

    # Swift Concurrency — strict mode chytí potenciální thread issues
    SWIFT_STRICT_CONCURRENCY: complete

    # Linker
    OTHER_LDFLAGS: "-ObjC"

    # Debug optimalizace
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    GCC_OPTIMIZATION_LEVEL: "0"

  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      VALIDATE_PRODUCT: YES

# ═══════════════════════════════════════════════════════════════════════
# SWIFT PACKAGES (SPM)
# ═══════════════════════════════════════════════════════════════════════

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

# ═══════════════════════════════════════════════════════════════════════
# TARGETS
# ═══════════════════════════════════════════════════════════════════════

targets:

  # ─── Hlavní iOS aplikace ─────────────────────────────────────────────
  AgileTrainer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Zdrojové soubory — XcodeGen rekurzivně hledá Swift soubory
    sources:
      - path: App
      - path: Core
      - path: Data
      - path: Domain
      - path: Features
      - path: LiveActivity
      - path: Services
      - path: Watch/WatchConnectivityManager.swift

    # Statické zdroje
    resources:
      - path: Resources/ExerciseDatabase.json
      - path: Resources/SystemPrompt.txt
      - path: Resources/OnboardingSystemPrompt.txt

    # ── Build Settings ───────────────────────────────────────────────
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agilefitness.trainer
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/AgileTrainer.entitlements

    # ── Info.plist klíče (generuje XcodeGen — ruční editace na Windows
    #    není potřeba) ────────────────────────────────────────────────
    info:
      path: Resources/Info.plist
      properties:
        # Základní metadata
        CFBundleDevelopmentRegion: cs
        CFBundleDisplayName: Agile Trainer
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        MinimumOSVersion: "17.0"
        NSSupportsLiveActivities: true

        # UI konfigurace
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
          - healthkit

        # Barevné schéma (vždy dark)
        UIUserInterfaceStyle: Dark
        
        # Povolení pro běh na pozadí (nutné pro BGTaskScheduler a GeoFencing)
        UIBackgroundModes:
          - fetch
          - processing
          - location

        # API klíče (injektovány přes Build Settings)
        GEMINI_API_KEY:    $(GEMINI_API_KEY)
        SUPABASE_URL:      $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)

        # ══════════════════════════════════════════════════════════════
        # HEALTHKIT PRIVACY STRINGS — POVINNÉ pro App Store
        # Bez těchto klíčů Apple Review zamítne app (automatická kontrola)
        # ══════════════════════════════════════════════════════════════

        # Čtení zdravotních dat (spánek, HRV, tep, dechová frekvence)
        NSHealthShareUsageDescription: >-
          Agilní trenér čte tvůj spánek, HRV a tepovou frekvenci z Apple Health.
          Tato data Jakubovi (AI trenérovi) umožňují personalizovat dnešní trénink
          a předejít přetrénování a zranění.

        # Zápis zdravotních dat (tréninky, aktivní kalorie)
        NSHealthUpdateUsageDescription: >-
          Aplikace zapisuje tvé odcvičené tréninky a spálené kalorie do Apple Health,
          abys měl kompletní přehled o své fyzické aktivitě na jednom místě.

        # Background refresh (HealthKit sync přes noc)
        BGTaskSchedulerPermittedIdentifiers:
          - com.agilefitness.healthSync

        # Notifikace (tréninkové připomínky, týdenní report)
        NSUserNotificationUsageDescription: >-
          Jakub ti pošle denní připomínku tréninku a týdenní přehled tvých výsledků.

        # Audio (AudioCoach hlasové pokyny)
        NSMicrophoneUsageDescription: >-
          Aplikace nepoužívá mikrofon — ale systém tuto hodnotu vyžaduje pro AVAudioSession.

        # Povolení pro otevírání Instagramu (sdílení Stories)
        LSApplicationQueriesSchemes:
          - instagram-stories

    # ── Entitlements (capabilities) ──────────────────────────────────
    # KRITICKÉ: tyto hodnoty MUSÍ odpovídat nastavení v Apple Developer Portal.
    # Pokud Capability v portálu chybí → build selže při signing.
    entitlements:
      path: Resources/AgileTrainer.entitlements
      properties:
        # HealthKit — klíčová funkce aplikace
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - HKQuantityTypeIdentifierHeartRate
          - HKQuantityTypeIdentifierRestingHeartRate
          - HKQuantityTypeIdentifierHeartRateVariabilitySDNN
          - HKCategoryTypeIdentifierSleepAnalysis
          - HKQuantityTypeIdentifierRespiratoryRate
          - HKQuantityTypeIdentifierActiveEnergyBurned
          - HKQuantityTypeIdentifierBasalEnergyBurned
          - HKWorkoutTypeIdentifier

        # App Groups — sdílené úložiště pro Widget a (budoucí) Watch Extension
        com.apple.security.application-groups:
          - group.com.agilefitness.shared

        # Push Notifications (APNs)
        aps-environment: development   # → production pro Release / App Store

        # Background Modes — HealthKit sync
        com.apple.developer.background-task: true

    # ── Závislosti (SPM packages) ─────────────────────────────────────
    dependencies:
      - package: Supabase
        product: Supabase

    # ── Pre-build: SwiftLint (volitelné) ─────────────────────────────
    preBuildScripts:
      - name: "✅ SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint --config .swiftlint.yml || true
          else
            echo "warning: SwiftLint není nainstalován. Spusť: brew install swiftlint"
          fi
        basedOnDependencyAnalysis: false
        showEnvVarsInLog: false

  # ─── Widget Extension ────────────────────────────────────────────────
  AgileTrainerWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Widget
      - path: LiveActivity
      # Sdílené soubory — Widget potřebuje modely a utility
      - path: Core/SharedModelContainer.swift
      - path: Core/Utilities/AppLogger.swift
      - path: Core/Theme.swift
      - path: Core/Extensions/Color+App.swift
      - path: Core/Extensions/Extensions.swift
      - path: Core/Constants/AppConstants.swift
      - path: Data/Models

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agilefitness.trainer.widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/AgileTrainerWidget.entitlements

    entitlements:
      path: Widget/AgileTrainerWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.agilefitness.shared

    dependencies:
      - target: AgileTrainer
        embed: false
        link: false

  # ─── Unit Testy ──────────────────────────────────────────────────────
  AgileTrainerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: UnitTests

    dependencies:
      - target: AgileTrainer

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agilefitness.trainer.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AgileTrainer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AgileTrainer"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_STRICT_CONCURRENCY: complete

  # ─── Watch App ──────────────────────────────────────────────────────
  AgileTrainerWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"

    sources:
      - path: Watch/App
      - path: Watch/Core
      - path: Watch/Views
      # Sdílené soubory — Watch potřebuje connectivity manager a typy
      - path: Watch/WatchConnectivityManager.swift
      - path: Core/Utilities/AppLogger.swift
      - path: Core/Constants/AppConstants.swift
      - path: Core/Extensions/Extensions.swift
      - path: Core/Extensions/Color+App.swift
      - path: Core/Theme.swift

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agilefitness.trainer.watch
        INFOPLIST_FILE: Watch/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Watch/Resources/AgileTrainerWatch.entitlements
        TARGETED_DEVICE_FAMILY: "4"  # 4 = Apple Watch
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        # Always-On Display — vyžaduje WKExtendedRuntimeSession v HKWorkoutSession
        WK_APP_BUNDLE_NAME: AgileTrainer

    info:
      path: Watch/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: cs
        CFBundleDisplayName: Agile Trainer
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        MinimumOSVersion: "10.0"
        UIUserInterfaceStyle: Dark
        WKApplication: true
        
        # Povolení pro běh na pozadí během cvičení (nutné pro VBT a HRR se zhasnutým displejem!)
        UIBackgroundModes:
          - workout-processing
          
        # HealthKit on Watch
        NSHealthShareUsageDescription: >-
          Agile Trainer čte tepovou frekvenci a spalování kalorií
          pro real-time tréninkový feedback.
        NSHealthUpdateUsageDescription: >-
          Aplikace zapisuje dokončené tréninky do Apple Health.
        # CoreMotion pro detekci opakování
        NSMotionUsageDescription: >-
          Hodinky sledují pohyb zápěstí pro automatické počítání opakování.

    entitlements:
      path: Watch/Resources/AgileTrainerWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - HKQuantityTypeIdentifierHeartRate
          - HKQuantityTypeIdentifierActiveEnergyBurned
          - HKWorkoutTypeIdentifier
        com.apple.security.application-groups:
          - group.com.agilefitness.shared

    dependencies:
      - target: AgileTrainer
        embed: false
        link: false

# ═══════════════════════════════════════════════════════════════════════
# SCHEMES
# ═══════════════════════════════════════════════════════════════════════

schemes:
  AgileTrainer:
    build:
      targets:
        AgileTrainer:       all
        AgileTrainerWidget: all
        AgileTrainerWatch:  [build, run]
        AgileTrainerTests:  [test]
    run:
      config: Debug
      environmentVariables:
        GEMINI_API_KEY:    $(GEMINI_API_KEY)
        SUPABASE_URL:      $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        # Zapne Memory Graph Debugger
        MallocStackLogging: "1"
    test:
      config: Debug
      targets:
        - name: AgileTrainerTests
          parallelizable: true
          randomExecutionOrder: true
      coverageTargets:
        - AgileTrainer
      # Environmet pro testy (mock klíče)
      environmentVariables:
        GEMINI_API_KEY:    test_mock_key
        SUPABASE_URL:      https://mock.supabase.co
        SUPABASE_ANON_KEY: test_mock_anon
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
